<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Timer Lomba</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container dashboard-grid">
      <!-- Header -->
      <header class="app-header">
        <div class="app-title">Timer Lomba</div>
        <div class="auto-mode-container">
          <span class="auto-mode-label">Mode Auto</span>
          <label class="switch">
            <input type="checkbox" id="auto-mode-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <nav class="tabs">
          <a href="index.html" class="tab">Beranda</a>
          <a href="single.html" class="tab active">Dashboard</a>
          <a href="persiapan.html" class="tab">Persiapan</a>
          <a href="lomba.html" class="tab">Lomba</a>
          <a href="evaluasi.html" class="tab">Evaluasi</a>
        </nav>
      </header>

      <!-- Left Column: Timers -->
      <main class="timer-list">
        <!-- Timers will be injected here by JS -->
        <button
          id="add-new-timer-btn"
          class="btn-text"
          style="margin-top: 1rem; justify-content: center"
        >
          <i class="fas fa-plus"></i> Tambah pewaktu baru
        </button>
      </main>

      <!-- Right Column: Configuration -->
      <aside class="config-panel hidden">
        <div class="config-header">
          <h3 id="config-title">Pengaturan Timer</h3>
        </div>

        <div class="setting-row">
          <label>Setel Durasi</label>
          <div class="duration-inputs">
            <div class="duration-box">
              <input type="number" id="cfg-hours" min="0" value="0" />
              <span>jam</span>
            </div>
            <div class="duration-box">
              <input type="number" id="cfg-mins" min="0" max="59" value="0" />
              <span>mnt</span>
            </div>
            <div class="duration-box">
              <input type="number" id="cfg-secs" min="0" max="59" value="0" />
              <span>dtk</span>
            </div>
          </div>
        </div>

        <div class="setting-row">
          <label>Daftar Suara Pengingat (assets/)</label>
          <div id="sound-list" class="sound-list"></div>
          <button id="add-sound-btn" class="btn-add-sound">
            <i class="fas fa-plus"></i> Tambah Suara Baru
          </button>
        </div>

        <button id="save-config-btn" class="main-action-btn">
          <i class="fas fa-save"></i> Simpan Pengaturan
        </button>
      </aside>

      <aside
        class="config-placeholder"
        id="config-empty-state"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          color: var(--text-muted);
          opacity: 0.5;
          padding: 4rem;
        "
      >
        <i
          class="fas fa-sliders-h"
          style="font-size: 3rem; margin-bottom: 1rem"
        ></i>
        <p>
          Pilih ikon <i class="fas fa-cog"></i> di timer untuk mengubah
          pengaturan.
        </p>
      </aside>
    </div>

    <script src="js/script.js"></script>
    <script>
      document.addEventListener("click", (e) => {
        if (e.target.closest(".settings-btn")) {
          document.getElementById("config-empty-state").style.display = "none";
        }
      });
    </script>
  </body>
</html>
