<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Lomba PLUS - Profesional & Estetik</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="container">
        <!-- Header (Akan selalu tampil) -->
        <header class="app-header">
            <div class="app-title" onclick="location.hash='#home'" style="cursor:pointer">Timer Lomba</div>
            <div class="auto-mode-container" id="global-auto-toggle-wrapper">
                <span class="auto-mode-label">Mode Auto</span>
                <label class="switch">
                    <input type="checkbox" id="auto-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <nav class="tabs">
                <a href="#home" class="tab" id="tab-home">Beranda</a>
                <a href="#dashboard" class="tab" id="tab-dashboard">Dashboard</a>
                <a href="#persiapan" class="tab" id="tab-persiapan">Persiapan</a>
                <a href="#lomba" class="tab" id="tab-lomba">Lomba</a>
                <a href="#evaluasi" class="tab" id="tab-evaluasi">Evaluasi</a>
                <a href="#petunjuk" class="tab" id="tab-petunjuk">Petunjuk</a>
            </nav>
        </header>

        <!-- Main Content Area -->
        <div id="view-container">
            <!-- Content will be injected here by script.js -->
        </div>

        <!-- Configuration Panel (Overlay/Side) -->
        <aside class="config-panel hidden" id="main-config-panel">
            <div class="config-header">
                <h3 id="config-title">Pengaturan Timer</h3>
                <button class="btn-text" onclick="app.closeSettings()" style="color:var(--text-muted)"><i class="fas fa-times"></i></button>
            </div>
            <div class="setting-row">
                <label>Setel Durasi</label>
                <div class="duration-inputs">
                    <div class="duration-box"><input type="number" id="cfg-hours" min="0" value="0"><span>jam</span></div>
                    <div class="duration-box"><input type="number" id="cfg-mins" min="0" max="59" value="0"><span>mnt</span></div>
                    <div class="duration-box"><input type="number" id="cfg-secs" min="0" max="59" value="0"><span>dtk</span></div>
                </div>
            </div>
            <div class="setting-row">
                <label>Suara Pengingat (assets/)</label>
                <div id="sound-list" class="sound-list"></div>
                <button id="add-sound-btn" class="btn-add-sound"><i class="fas fa-plus"></i> Tambah Suara Baru</button>
            </div>
            <button id="save-config-btn" class="main-action-btn"><i class="fas fa-save"></i> Simpan Pengaturan</button>
        </aside>
    </div>

    <!-- Templates (Hidden from DOM) -->
    <template id="template-home">
        <div class="home-view">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h1 style="font-size: 2.5rem; color: #333; margin-bottom: 0.5rem;">Selamat Datang</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Panel kontrol waktu profesional untuk segala perlombaan.</p>
            </div>
            <div class="home-options">
                <a href="#dashboard" class="home-card">
                    <span class="icon" style="color: var(--accent)"><i class="fas fa-desktop"></i></span>
                    <h3>Dashboard Utama</h3>
                    <p>Pantau semua timer (Persiapan, Lomba, Evaluasi) dalam satu layar kontrol yang lengkap.</p>
                </a>
                <a href="#persiapan" class="home-card">
                    <span class="icon" style="color: var(--accent)"><i class="fas fa-expand"></i></span>
                    <h3>Mode Fokus</h3>
                    <p>Tampilkan satu timer saja di layar besar agar peserta bisa fokus pada waktu yang berjalan.</p>
                </a>
                <a href="#petunjuk" class="home-card">
                    <span class="icon" style="color: var(--accent)"><i class="fas fa-book"></i></span>
                    <h3>Petunjuk Penggunaan</h3>
                    <p>Baca panduan lengkap mengenai pengaturan durasi, suara pengingat, dan mode otomatis.</p>
                </a>
            </div>
        </div>
    </template>

    <template id="template-dashboard">
        <div class="dashboard-grid-view">
            <main class="timer-list" id="dashboard-timer-list">
                <!-- Timers injected here -->
                <button id="add-new-timer-btn" class="btn-text" style="margin-top: 1rem; justify-content: center; width: 100%">
                    <i class="fas fa-plus"></i> Tambah pewaktu baru
                </button>
            </main>
            <aside class="config-placeholder" id="config-empty-state">
                <i class="fas fa-sliders-h" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <p>Pilih ikon <i class="fas fa-cog"></i> di timer untuk mengubah pengaturan.</p>
            </aside>
        </div>
    </template>

    <template id="template-focused">
        <div class="focused-view">
            <main class="timer-list" data-focused="true" id="focused-timer-list">
                <!-- Single timer injected here -->
            </main>
        </div>
    </template>

    <template id="template-petunjuk">
        <div class="guide-content">
            <h2><i class="fas fa-info-circle"></i> Petunjuk Penggunaan Lengkap</h2>
            
            <h3>1. Kontrol Timer di Kartu</h3>
            <ul>
                <li>Setiap timer memiliki 3 tombol aksi cepat:
                    <ul>
                        <li><i class="fas fa-redo"></i> <strong>Reset:</strong> Mengulang waktu ke posisi awal.</li>
                        <li><i class="fas fa-cog"></i> <strong>Pengaturan:</strong> Membuka panel suara dan durasi.</li>
                        <li><i class="fas fa-play"></i> <strong>Mulai/Jeda:</strong> Menjalankan atau menghentikan timer.</li>
                    </ul>
                </li>
            </ul>

            <h3>2. Mengatur Banyak Suara (Slot Suara)</h3>
            <ul>
                <li>Anda bisa menambah lebih dari satu suara untuk satu timer.</li>
                <li>Klik <strong>"+ Tambah Suara Baru"</strong> untuk menambah slot.</li>
                <li>Gunakan **Dropdown** untuk memilih file di folder <code>assets/</code>.</li>
                <li>Gunakan ikon **Play Hijau** (<i class="fas fa-play-circle"></i>) untuk mengetes suara.</li>
            </ul>

            <h3>3. Logika Trigger Suara <span class="badge">PENTING</span></h3>
            <ul>
                <li><strong>Mulai:</strong> Bunyi dari detik ke-0 dan <strong>berhenti otomatis</strong> pada detik ke-X yang diinput. (Cocok untuk Intro).</li>
                <li><strong>Selesai:</strong> Mulai bunyi saat sisa waktu mencapai X detik terakhir (Countdown).</li>
                <li><strong>Berputar:</strong> Bunyi terus-menerus (loop) selama timer berjalan.</li>
            </ul>

            <h3>4. Mode Auto & Navigasi</h3>
            <ul>
                <li>Aktifkan <strong>Mode Auto</strong> agar timer berpindah otomatis ke tahap berikutnya (Persiapan &rarr; Lomba &rarr; Evaluasi).</li>
                <li>Sistem akan otomatis berpindah halaman dan langsung menjalankan timer berikutnya.</li>
            </ul>

            <h3>5. Mode Fokus (Layar Besar)</h3>
            <ul>
                <li>Buka menu **Persiapan, Lomba, atau Evaluasi** untuk tampilan timer raksasa yang dirancang khusus untuk proyektor.</li>
            </ul>

            <a href="#home" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
        </div>
    </template>

    <script src="js/script.js"></script>
</body>
</html>
